name: Daily Event Scraper

# ALL scraping runs HERE, on the Actions runner — standing rule (July 2026).
# The old design curled soiree.today/api/scrape per group, which meant the
# actual fetch/parse work executed inside Vercel functions: that steady CPU
# burn (plus a duplicate Vercel cron hitting the same endpoint) is what blew
# the account's fair-use limits and took every site down. The runner now
# invokes the exact same scraper code (scripts/run-scrape.js wraps the
# api/scrape.js handler) and writes straight to Postgres — no Vercel compute,
# no dependency on the site being up, no 60s function cap.
#
# Scraping is purely additive/upsert (INSERT ... ON CONFLICT (url) DO UPDATE),
# so a partial failure can never wipe live data. One flaky group doesn't fail
# the day; zero successes does.

on:
  schedule:
    # 6 AM ET daily (10 UTC in summer) — the single daily scrape; the old
    # duplicate Vercel cron is removed from vercel.json
    - cron: '0 10 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Scrape all groups
        env:
          POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
          SCRAPE_SECRET: ${{ secrets.SCRAPE_SECRET }}
        run: node scripts/run-scrape.js

      # ── Cloudflare Pages staging (July 2026) ─────────────────────────
      # OG cards render HERE (batch doctrine: satori+resvg is too CPU-heavy
      # for Pages Functions) and ship as static files under /og-events/.
      - name: Build OG share images
        env:
          POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
        run: node scripts/build-og-events.js

      # One pass refreshes both data (DB, above) and OG images (static).
      # Guarded so the daily scrape never fails while CF is being staged.
      - name: Deploy site to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then echo "no CF token; skipping deploy"; exit 0; fi
          bash scripts/build-pages.sh
          cp -R og-events dist/og-events 2>/dev/null || true
          npx wrangler pages deploy dist --project-name soiree --branch main --commit-dirty=true
